<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Session Guard Alert</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; background: #111; color: #fff; }
    .card { background: #1d1f24; border-radius: 10px; padding: 14px; box-shadow: 0 5px 15px rgba(0,0,0,.35); }
    h1 { margin-top: 0; font-size: 1.25rem; color: #ffcc00; }
    p { margin: 8px 0; line-height: 1.4; }
    a { color: #82c7ff; text-decoration: underline; }
    .close { margin-top: 12px; background: #ff4b4b; border: none; color: white; border-radius: 5px; padding: 8px 12px; cursor: pointer; width: 100%; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">⚠️ Alert</h1>
    <p id="message"></p>
    <p><strong>URL:</strong> <a id="url" href="#" target="_blank"></a></p>
    <p id="details" style="font-size:0.9rem; color:#ccd6ff;"></p>
    <button class="close" id="closeBtn">Close</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const rawTitle = params.get('title');
    const rawMessage = params.get('message');
    const rawUrl = params.get('url');
    const rawDetails = params.get('details');

    const title = rawTitle ? decodeURIComponent(rawTitle) : '⚠️ Session Guard Alert';
    const message = rawMessage ? decodeURIComponent(rawMessage) : 'Something is wrong. Please inspect this request.';
    const url = rawUrl ? decodeURIComponent(rawUrl) : '';
    const detailsText = rawDetails ? decodeURIComponent(rawDetails) : '';

    document.getElementById('title').textContent = title;
    document.getElementById('message').textContent = message;

    const urlEl = document.getElementById('url');
    if (url) {
      urlEl.textContent = url;
      urlEl.href = url;
    } else {
      urlEl.textContent = 'URL not available';
      urlEl.href = '#';
    }

    const detailsEl = document.getElementById('details');
    const queryDebug = [...params.entries()].map(([k,v]) => `${k}=${v}`).join(' | ');
    if (detailsText) {
      detailsEl.textContent = `Details: ${detailsText}`;
    } else {
      detailsEl.textContent = `No additional details. Query: ${queryDebug}`;
    }

    document.getElementById('closeBtn').addEventListener('click', () => window.close());
  </script>
</body>
</html>
