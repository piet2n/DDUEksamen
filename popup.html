<!DOCTYPE html>
<html>
<head>
  <title>Vinduesrens</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 12px;
      min-width: 280px;
      background: #f7f9fb;
      color: #333;
    }

    h1 {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .score {
      font-size: 28px;
      font-weight: bold;
    }

    .safe { color: #2ecc71; }
    .warn { color: #f39c12; }
    .danger { color: #e74c3c; }

    .label {
      font-size: 12px;
      opacity: 0.7;
    }

    .row {
      display: flex;
      justify-content: space-between;
    }

    ul {
      padding-left: 18px;
      font-size: 13px;
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #3498db;
      color: white;
      cursor: pointer;
    }

    canvas {
      margin-top: 8px;
    }

    .footer {
      font-size: 11px;
      text-align: center;
      opacity: 0.6;
      margin-top: 5px;
    }
  </style>
</head>
<body>

<h1>Vinduesrens</h1>

<div class="card">
  <div class="label">Privacy Score</div>
  <div id="score" class="score">--</div>
  <div id="statusText"></div>
</div>

<div class="card">
  <div class="row">
    <div>Blocked trackers</div>
    <div id="trackerCount"><strong>0</strong></div>
  </div>
</div>

<div class="card">
  <div class="label">This site shares data with:</div>
  <div id="trackerList">No known trackers</div>
</div>

<div class="card">
  <div class="label">Your protection</div>
  <div id="statsBlock">Loading...</div>
  <canvas id="statsChart" height="120"></canvas>
</div>

<div class="card">
  <div class="toggle">
    <input type="checkbox" id="autoDenyToggle" />
    <label for="autoDenyToggle">Auto-reject cookies</label>
  </div>
</div>

<div class="card">
  <button id="readMoreBtn">Read more / Help</button>
</div>

<div class="footer">
  Protecting your privacy automatically
</div>

<script src="popup.js"></script>
</body>
</html>
